<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>The Girl Who Collected Clouds — StoryVerse</title>
<style>
:root{
  --bg:#0F0A1E;--bg2:#1A1035;--bg3:#251848;
  --gold:#FFD700;--text:#ECE8F5;--text2:#9B94B8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Georgia',serif;overflow:hidden;touch-action:pan-y;}

/* ── COVER SCREEN ── */
#cover-screen{
  position:fixed;inset:0;z-index:100;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px;
}
.cover-img{width:100%;max-width:440px;border-radius:16px;object-fit:cover;box-shadow:0 24px 64px rgba(0,0,0,0.7);margin-bottom:28px;}
.cover-img-placeholder{width:100%;max-width:440px;height:280px;background:var(--bg3);border-radius:16px;margin-bottom:28px;display:flex;align-items:center;justify-content:center;font-size:64px;}
.cover-title{font-size:clamp(22px,6vw,38px);font-weight:bold;text-align:center;line-height:1.2;margin-bottom:8px;color:var(--text);}
.cover-subtitle{font-size:clamp(13px,3vw,17px);color:var(--text2);text-align:center;margin-bottom:6px;font-style:italic;}
.cover-author{font-size:14px;color:var(--text2);text-align:center;margin-bottom:32px;}
.start-btn{
  background:var(--gold);color:#1A1025;border:none;border-radius:14px;
  padding:16px 48px;font-size:18px;font-weight:bold;cursor:pointer;
  font-family:inherit;box-shadow:0 8px 24px rgba(255,215,0,0.35);
  transition:transform .15s;
}
.start-btn:hover{transform:translateY(-2px);}
.cover-meta{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.cmeta{background:var(--bg3);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--text2);}

/* ── READER ── */
#reader{position:fixed;inset:0;display:none;flex-direction:column;background:#0A0614;}
#reader.open{display:flex;}

/* Top bar */
.topbar{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  background:rgba(10,6,20,0.92);backdrop-filter:blur(8px);
  flex-shrink:0;
}
.back-btn{background:none;border:none;color:var(--text);font-size:20px;cursor:pointer;padding:4px 8px;}
.story-title{flex:1;font-size:14px;font-weight:bold;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pg-num{background:rgba(255,255,255,0.1);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--text2);white-space:nowrap;}

/* Page area */
.page-area{flex:1;position:relative;overflow:hidden;}
.page{
  position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;transition:opacity .4s ease;pointer-events:none;
}
.page.active{opacity:1;pointer-events:all;}
.page.slide-in-right{animation:slideInR .4s ease forwards;}
.page.slide-in-left{animation:slideInL .4s ease forwards;}
@keyframes slideInR{from{transform:translateX(60px);opacity:0;}to{transform:none;opacity:1;}}
@keyframes slideInL{from{transform:translateX(-60px);opacity:0;}to{transform:none;opacity:1;}}

.page-img{flex:0 0 58%;background:var(--bg3);position:relative;overflow:hidden;}
.page-img img{width:100%;height:100%;object-fit:cover;display:block;}
.page-img::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:35%;
  background:linear-gradient(transparent,#0A0614);
}
.page-text{
  flex:1;padding:16px 20px 0;overflow-y:auto;
  font-family:'Georgia',serif;font-size:clamp(14px,3.5vw,18px);
  line-height:1.75;color:var(--text);
}
.scene-title{font-size:clamp(13px,3vw,16px);font-weight:bold;color:var(--gold);margin-bottom:10px;font-family:sans-serif;}

/* Controls */
.controls{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));
  background:rgba(10,6,20,0.95);flex-shrink:0;
}
.cbtn{
  width:46px;height:46px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.07);
  color:var(--text);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.cbtn:hover{background:rgba(255,255,255,0.15);}
.cbtn.on{background:rgba(255,215,0,0.18);border-color:var(--gold);color:var(--gold);}
.cbtn:disabled{opacity:.3;cursor:default;}
.cbtn.big{width:54px;height:54px;font-size:24px;}

/* Progress */
.prog-wrap{
  height:2px;background:rgba(255,255,255,0.07);flex-shrink:0;
}
.prog-fill{height:100%;background:var(--gold);transition:width .35s ease;}

/* Back cover */
.back-cover{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:36px;text-align:center;background:var(--bg);
}
.bc-emoji{font-size:64px;margin-bottom:20px;}
.bc-title{font-size:22px;font-weight:bold;color:var(--gold);margin-bottom:12px;}
.bc-moral{font-size:15px;color:var(--text2);line-height:1.65;max-width:340px;margin-bottom:24px;font-style:italic;}
.bc-restart{background:var(--bg3);border:1px solid rgba(255,255,255,0.12);color:var(--text);border-radius:10px;padding:10px 28px;cursor:pointer;font-size:14px;}

@media(min-width:640px){
  .page{flex-direction:row;}
  .page-img{flex:0 0 55%;}
  .page-text{padding:28px 32px 0;}
}
</style>
</head>

const TOTAL  = 6;
const META   = {"id": "the-girl-who-collected-clouds", "title": "The Girl Who Collected Clouds", "subtitle": "A Journey of Light and Wonder", "author": "Elara Skye", "genre": "Fantasy / Nature", "age_group": "6-8", "synopsis": "Luna is a quiet girl who loves to catch clouds in her jar, believing they hold the world's most beautiful secrets. When she discovers a cloud that has lost its light, she embarks on a journey to the sun to help it shine again, discovering her own inner light in the process.", "moral": "Your uniqueness is your greatest strength, and your kindness can bring light to the world.", "dedication": "For everyone who has ever looked up and wondered...", "total_scenes": 6};

let cur=0, autoPlay=false, ttsOn=false, ttsActive=false;
let touchX=0;

function startReading(){
  document.getElementById('cover-screen').style.display='none';
  const r=document.getElementById('reader'); r.classList.add('open');
  buildPage(0,null);
}
function showCover(){
  stopTts();autoPlay=false;
  document.getElementById('reader').classList.remove('open');
  document.getElementById('cover-screen').style.display=''; 
  cur=0;
}

function buildPage(idx,dir){
  const area=document.getElementById('page-area');
  const old=area.querySelector('.page.active');
  if(old){old.classList.remove('active');}

  if(idx>=TOTAL){
    // Back cover
    const bc=document.createElement('div');
    bc.className='page active';
    bc.innerHTML=`<div class="back-cover">
      <div class="bc-emoji">🌟</div>
      <div class="bc-title">The End</div>
      <div class="bc-moral">${META.moral||'What a wonderful story!'}</div>
      <div style="font-size:13px;color:#6B6490;margin-bottom:20px;">by ${META.author}</div>
      <button class="bc-restart" onclick="goTo(0)">&#8635; Read Again</button>
    </div>`;
    if(old) old.remove();
    area.appendChild(bc);
    updateUI(idx); return;
  }

  const s=SCENES[idx];
  const p=document.createElement('div');
  p.className='page'+(dir==='next'?' slide-in-right':(dir==='prev'?' slide-in-left':'')); 
  p.innerHTML=`
    <div class="page-img">${s.img?`<img src="${s.img}" alt="Scene ${s.num}" loading="eager"/>`:``}</div>
    <div class="page-text">
      <div class="scene-title">Scene ${s.num}: ${s.title}</div>
      ${s.text}
    </div>`;
  if(old) old.remove();
  area.appendChild(p);
  requestAnimationFrame(()=>p.classList.add('active'));
  updateUI(idx);
  if(autoPlay) setTimeout(()=>speak(s.narration||s.text),400);
}

function updateUI(idx){
  const onLast=(idx>=TOTAL);
  document.getElementById('pg-num').textContent=
    idx>=TOTAL?'The End':`${idx+1} / ${TOTAL}`;
  document.getElementById('prog').style.width=
    (TOTAL>1?(idx/TOTAL)*100:100)+'%';
  const bp=document.getElementById('btn-prev');
  const bn=document.getElementById('btn-next');
  bp.disabled=(idx===0);
  bn.disabled=onLast;
}

function next(){if(cur<=TOTAL){stopTts();cur++;buildPage(cur,'next');}}
function prev(){if(cur>0){stopTts();cur--;buildPage(cur,'prev');}}
function goTo(idx){stopTts();cur=idx;buildPage(cur,null);}

function toggleAuto(){
  autoPlay=!autoPlay;
  document.getElementById('btn-auto').classList.toggle('on',autoPlay);
  if(autoPlay&&cur<TOTAL) speak(SCENES[cur]?.narration||SCENES[cur]?.text||'');
}
function toggleTts(){
  if(ttsActive){stopTts();}
  else if(cur<TOTAL){speak(SCENES[cur]?.narration||SCENES[cur]?.text||'');}
}
function replay(){
  if(cur<TOTAL){stopTts();speak(SCENES[cur]?.narration||SCENES[cur]?.text||'');}
}

let utter=null;
function speak(text){
  if(!'speechSynthesis'in window)return;
  stopTts();
  utter=new SpeechSynthesisUtterance(text);
  utter.rate=0.88;utter.pitch=1.0;utter.lang='en-US';
  const vv=speechSynthesis.getVoices();
  const pv=vv.find(v=>v.name.includes('Samantha')||v.name.includes('Karen')||v.name.includes('Daniel'))||vv.find(v=>v.lang.startsWith('en'));
  if(pv)utter.voice=pv;
  utter.onend=()=>{
    ttsActive=false;updateTtsBtn();
    if(autoPlay&&cur<TOTAL-1)setTimeout(()=>{next();},700);
    else if(autoPlay&&cur===TOTAL-1)setTimeout(()=>{cur++;buildPage(cur,'next');},700);
  };
  ttsActive=true;updateTtsBtn();
  speechSynthesis.speak(utter);
}
function stopTts(){
  if('speechSynthesis'in window)speechSynthesis.cancel();
  ttsActive=false;updateTtsBtn();
}
function updateTtsBtn(){
  document.getElementById('btn-tts').classList.toggle('on',ttsActive);
}

// Touch swipe
document.getElementById('page-area').addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
document.getElementById('page-area').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>45){if(dx<0)next();else prev();}
},{passive:true});
// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')next();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')prev();
  if(e.key===' '){e.preventDefault();toggleTts();}
});
if('speechSynthesis'in window)speechSynthesis.getVoices();
</script>
</body></html>
